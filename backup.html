        // --- Logika Accordion ---
        function toggleAccordion(header) {
            const item = header.parentElement;
            const allItems = document.querySelectorAll('.accordion-item');
            
            // Tutup item lain yang sedang terbuka
            allItems.forEach(otherItem => {
                if (otherItem !== item && otherItem.classList.contains('active')) {
                    otherItem.classList.remove('active');
                    otherItem.querySelector('.accordion-content').style.maxHeight = null;
                }
            });

            const content = item.querySelector('.accordion-content');
            
            // Toggle active class
            item.classList.toggle('active');
            
            // Toggle max-height for animation
            if (item.classList.contains('active')) {
                content.style.maxHeight = "60vh";
            } else {
                content.style.maxHeight = null;
            }

        // --- Fungsi Backup & Reset ---

        // Bikin CSV dari JSON
        function jsonToCsv(jsonData) {
            if (!jsonData || jsonData.length === 0) return "";
            const keys = Object.keys(jsonData[0]);
            const header = keys.join(",");
            const rows = jsonData.map(row => 
                keys.map(key => {
                    let val = row[key] === null || row[key] === undefined ? "" : row[key];
                    // Escape quotes and wrap in quotes if contains comma, newline or quote
                    if (typeof val === 'string') {
                        val = val.replace(/"/g, '""');
                        if (val.includes(',') || val.includes('\n') || val.includes('"')) {
                            val = `"${val}"`;
                        }
                    }
                    return val;
                }).join(",")
            );
            return [header, ...rows].join("\n");
        }

        // Download File CSV
        function downloadCSV(csvContent, fileName) {
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", fileName);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 1. Backup Identitas
        async function handleBackupIdentitas() {
            if (!confirm("Apakah Anda yakin ingin membackup (Export CSV) dan MENGHAPUS seluruh data Identitas Sekolah?")) return;

            try {
                // 1. Ambil Data
                const { data, error } = await supabaseClient.from('identitassekolah').select('*');
                if (error) throw new Error("Gagal mengambil data: " + error.message);
                
                if (!data || data.length === 0) {
                    alert("Tidak ada data Identitas Sekolah untuk dibackup.");
                    return;
                }

                // 2. Ekspor CSV
                const csv = jsonToCsv(data);
                const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
                downloadCSV(csv, `identitassekolah_backup_${timestamp}.csv`);

                // 3. Hapus Data
                // Hapus semua data. Pake filter npsn > 0
                const { error: deleteError } = await supabaseClient
                    .from('identitassekolah')
                    .delete()
                    .gt('npsn', 0); // Asumsi NPSN adalah angka positif

                if (deleteError) throw new Error("Gagal menghapus data: " + deleteError.message);

                alert("Backup berhasil! Data Identitas Sekolah telah dihapus dari database.");
                
                // Update UI (Kosongkan Navbar)
                document.querySelector('.navbar-brand span').textContent = '';
                const img = document.querySelector('.navbar-brand img');
                if(img) img.style.display = 'none';

            } catch (err) {
                console.error(err);
                alert("Terjadi kesalahan: " + err.message);
            }
        }

        }

        document.getElementById('importFileIdentitas').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                dynamicTyping: true,
                complete: async function(results) {
                    const data = results.data;
                    if (!data || data.length === 0) {
                        alert("File CSV kosong atau format tidak valid.");
                        return;
                    }

                    try {
                        const { error } = await supabaseClient.from('identitassekolah').upsert(data);
                        if (error) throw new Error(error.message);

                        alert("Data Identitas Sekolah berhasil direstore!");
                        loadSchoolIdentity(); // Refresh Navbar
                    } catch (err) {
                        console.error("Import Error:", err);
                        alert("Gagal merestore data: " + err.message);
                    }
                    event.target.value = ''; // Reset input
                },
                error: function(err) {
                    alert("Gagal membaca file CSV: " + err.message);
                }
            });
        });

        // 31. Backup Semua (ZIP & Reset)
        async function handleBackupAll() {
            if (!confirm("PERINGATAN KERAS:\n\nAnda akan membackup SEMUA data ke dalam satu file ZIP dan MENGHAPUS SEMUA data dari database (RESET TOTAL).\n\nTindakan ini tidak dapat dibatalkan.\n\nApakah Anda yakin ingin melanjutkan?")) return;

            const zip = new JSZip();
            const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
            const folderName = `backup_full_${timestamp}`;
            const folder = zip.folder(folderName);

            try {
                // Ambil & Masukin ZIP
                const fetchAndAddToZip = async (client, tableName, fileName) => {
                    const { data, error } = await client.from(tableName).select('*');
                    if (error) throw new Error(`Gagal mengambil data ${tableName}: ${error.message}`);
                    if (data && data.length > 0) {
                        const csv = jsonToCsv(data);
                        folder.file(fileName, csv);
                    }
                };

                // 1. Ambil & ZIP Semua
                await fetchAndAddToZip(supabaseClient, 'identitassekolah', 'identitassekolah.csv');
                await fetchAndAddToZip(supabaseClient, 'rombel', 'rombel.csv');
                await fetchAndAddToZip(supabaseClient, 'dataguru', 'dataguru.csv');
                await fetchAndAddToZip(supabaseClient, 'datasiswa', 'datasiswa.csv');
                await fetchAndAddToZip(supabaseClient, 'walikelas', 'walikelas.csv');
                await fetchAndAddToZip(supabaseClient, 'guruwali', 'guruwali.csv');
                await fetchAndAddToZip(supabaseClient, 'gurupiket', 'gurupiket.csv');
                await fetchAndAddToZip(absensiClient, 'mappingsiswa', 'mappingsiswa.csv');
                await fetchAndAddToZip(absensiClient, 'matapelajaran', 'matapelajaran.csv');
                await fetchAndAddToZip(supabaseClient, 'jurnalpiket', 'jurnalpiket.csv');
                await fetchAndAddToZip(absensiClient, 'absensiswa', 'absensiswa.csv');
                await fetchAndAddToZip(supabaseClient, 'pembinaanwali', 'pembinaanwali.csv');
                await fetchAndAddToZip(absensiClient, 'nilaimapel', 'nilaimapel.csv');
                await fetchAndAddToZip(absensiClient, 'kasussiswa', 'kasussiswa.csv');
                await fetchAndAddToZip(absensiClient, 'dispensasi', 'dispensasi.csv');
                await fetchAndAddToZip(supabaseClient, 'datapiketsiswa', 'datapiketsiswa.csv');
                await fetchAndAddToZip(supabaseClient, 'perwalian', 'perwalian.csv');

                // 2. Bikin & Download ZIP
                const content = await zip.generateAsync({ type: "blob" });
                saveAs(content, `${folderName}.zip`);

                // 3. Hapus Semua Data
                // Hapus detail dulu
                const deleteTable = async (client, tableName, filterCol, filterVal) => {
                    let query = client.from(tableName).delete();
                    // Pake filter yang sama kayak backup satuan
                    if (tableName === 'identitassekolah') query = query.gt('npsn', 0);
                    else if (tableName === 'rombel') query = query.gt('id', 0);
                    else if (tableName === 'dataguru') query = query.not('id_guru', 'is', null);
                    else if (tableName === 'datasiswa') query = query.not('nisn', 'is', null);
                    else if (tableName === 'walikelas') query = query.not('nip', 'is', null);
                    else if (tableName === 'guruwali') query = query.not('nip', 'is', null);
                    else if (tableName === 'gurupiket') query = query.not('id', 'is', null);
                    else if (tableName === 'mappingsiswa') query = query.not('kode_maping', 'is', null);
                    else if (tableName === 'matapelajaran') query = query.not('id', 'is', null);
                    else if (tableName === 'jurnalpiket') query = query.not('id_piket', 'is', null);
                    else if (tableName === 'absensiswa') query = query.not('kode_absen', 'is', null);
                    else if (tableName === 'pembinaanwali') query = query.not('id_pembinaan', 'is', null);
                    else if (tableName === 'nilaimapel') query = query.not('id', 'is', null);
                    else if (tableName === 'kasussiswa') query = query.not('id_kasus', 'is', null);
                    else if (tableName === 'dispensasi') query = query.not('kode_dispen', 'is', null);
                    else if (tableName === 'datapiketsiswa') query = query.not('id_piket', 'is', null);
                    else if (tableName === 'perwalian') query = query.not('kode_id', 'is', null);
                    
                    const { error } = await query;
                    if (error) throw new Error(`Gagal menghapus data ${tableName}: ${error.message}`);
                };

                // Eksekusi Hapus
                await Promise.all([
                    deleteTable(absensiClient, 'dispensasi'),
                    deleteTable(absensiClient, 'kasussiswa'),
                    deleteTable(absensiClient, 'nilaimapel'),
                    deleteTable(supabaseClient, 'pembinaanwali'),
                    deleteTable(absensiClient, 'absensiswa'),
                    deleteTable(supabaseClient, 'jurnalpiket'),
                    deleteTable(supabaseClient, 'datapiketsiswa'),
                    deleteTable(supabaseClient, 'perwalian')
                ]);

                await Promise.all([
                    deleteTable(absensiClient, 'mappingsiswa'),
                    deleteTable(supabaseClient, 'gurupiket'),
                    deleteTable(supabaseClient, 'guruwali'),
                    deleteTable(supabaseClient, 'walikelas')
                ]);

                await Promise.all([
                    deleteTable(absensiClient, 'matapelajaran'),
                    deleteTable(supabaseClient, 'datasiswa'),
                    deleteTable(supabaseClient, 'dataguru'),
                    deleteTable(supabaseClient, 'rombel')
                ]);

                // Hapus identitas terakhir
                await deleteTable(supabaseClient, 'identitassekolah');

                alert("Backup ZIP berhasil didownload dan Database telah di-RESET total.");
                location.reload(); // Refresh halaman

            } catch (err) {
                console.error(err);
                alert("Terjadi kesalahan saat proses Backup & Reset: " + err.message);
            }
        }

        // 32. Import Semua (Banyak CSV)
        function handleImportAll() {
            document.getElementById('importFileAll').click();
        }

        document.getElementById('importFileAll').addEventListener('change', async function(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            if (!confirm(`Anda akan mengimport ${files.length} file CSV. Pastikan nama file sesuai dengan nama tabel (contoh: datasiswa_backup.csv). Lanjutkan?`)) {
                this.value = '';
                return;
            }

            let successCount = 0;
            let failCount = 0;
            let errors = [];

            const tableConfig = {
                'identitassekolah': { client: supabaseClient, table: 'identitassekolah' },
                'rombel': { client: supabaseClient, table: 'rombel' },
                'dataguru': { client: supabaseClient, table: 'dataguru' },
                'datasiswa': { client: supabaseClient, table: 'datasiswa' },
                'walikelas': { client: supabaseClient, table: 'walikelas' },
                'guruwali': { client: supabaseClient, table: 'guruwali' },
                'gurupiket': { client: supabaseClient, table: 'gurupiket' },
                'jurnalpiket': { client: supabaseClient, table: 'jurnalpiket' },
                'pembinaanwali': { client: supabaseClient, table: 'pembinaanwali' },
                'mappingsiswa': { client: absensiClient, table: 'mappingsiswa' },
                'matapelajaran': { client: absensiClient, table: 'matapelajaran' },
                'absensiswa': { client: absensiClient, table: 'absensiswa' },
                'nilaimapel': { client: absensiClient, table: 'nilaimapel' },
                'kasussiswa': { client: absensiClient, table: 'kasussiswa' },
                'dispensasi': { client: absensiClient, table: 'dispensasi' }
            };

            const processFile = (file) => {
                return new Promise((resolve) => {
                    const fileName = file.name.toLowerCase();
                    let targetConfig = null;

                    // Find matching table
                    for (const key in tableConfig) {
                        if (fileName.startsWith(key)) {
                            targetConfig = tableConfig[key];
                            break;
                        }
                    }

                    if (!targetConfig) {
                        errors.push(`${file.name}: Tidak dikenali sebagai tabel yang valid.`);
                        failCount++;
                        resolve();
                        return;
                    }

                    Papa.parse(file, {
                        header: true,
                        skipEmptyLines: true,
                        dynamicTyping: true,
                        complete: async function(results) {
                            const data = results.data;
                            if (!data || data.length === 0) {
                                errors.push(`${file.name}: File kosong atau format salah.`);
                                failCount++;
                                resolve();
                                return;
                            }

                            try {
                                const { error } = await targetConfig.client
                                    .from(targetConfig.table)
                                    .upsert(data);
                                
                                if (error) throw error;
                                successCount++;
                            } catch (err) {
                                errors.push(`${file.name}: ${err.message}`);
                                failCount++;
                            }
                            resolve();
                        },
                        error: function(err) {
                            errors.push(`${file.name}: Gagal membaca CSV (${err.message})`);
                            failCount++;
                            resolve();
                        }
                    });
                });
            };

            // Process all files
            const promises = Array.from(files).map(file => processFile(file));
            
            await Promise.all(promises);

            let msg = `Proses Import Selesai.\nBerhasil: ${successCount}\nGagal: ${failCount}`;
            if (errors.length > 0) {
                msg += `\n\nDetail Error:\n` + errors.join('\n');
            }
            alert(msg);
            this.value = ''; // Reset input
        });
    </script>
