<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMPEDIK</title>
    <!-- Icon Keren -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <!-- Lib Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --sidebar-bg: #2c3e50;
            --sidebar-text: #ecf0f1;
            --sidebar-hover: #34495e;
            --header-height: 60px;
            --sidebar-width: 260px;
            --bg-light: #f4f6f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Navigasi Atas --- */
        .navbar {
            height: var(--header-height);
            background-color: #fff;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 1002;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #333;
        }

        .navbar-brand img {
            height: 40px;
            width: auto;
        }

        .navbar-brand span {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--secondary-color);
        }

        /* --- Konten Utama --- */
        .main-content {
            margin-top: var(--header-height);
            padding: 1rem 5px;
            flex: 1;
            overflow-y: auto;
        }

        @media (min-width: 576px) {
            .main-content { padding: 1.5rem 1rem; }
        }
        @media (min-width: 768px) {
            .main-content { padding: 2rem; }
        }

        .dashboard-card {
            background: white;
            padding: 15px 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        @media (min-width: 576px) {
            .dashboard-card { padding: 20px; }
        }

        /* Gaya Tabel */
        .table-responsive {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }

        .custom-table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
        }

        .custom-table th, .custom-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }

        .custom-table th {
            background-color: #f8fafc;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .custom-table tr:hover {
            background-color: #f1f5f9;
        }

        .custom-table td {
            color: #334155;
            font-size: 0.95rem;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background-color: #e0e7ff;
            color: var(--primary-color);
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-download:hover {
            background-color: var(--primary-color);
            color: white !important;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(102, 126, 234, 0.25);
        }

        /* Kaki Halaman */
        .main-footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.85rem;
            border-top: 1px solid #eee;
            margin-top: 20px;
        }

        /* --- Tampilan HP --- */
        @media (max-width: 768px) {
            .table-actions { flex-direction: column; align-items: stretch; gap: 10px; }
            .action-group { flex-direction: column; width: 100%; gap: 10px; }
            .action-group button, .action-group input { 
                width: 100% !important; 
                justify-content: center;
                margin: 0;
            }
        }

        /* Optimasi Tata Letak Aksi (Symmetry) */
        .table-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .action-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-action-custom {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: opacity 0.2s;
        }

        /* --- Gaya Modal --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: white;
            width: 90%;
            max-width: 500px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .modal-header h3 {
            margin: 0;
            color: #333;
            font-size: 1.2rem;
        }

        .close-modal {
            font-size: 1.5rem;
            cursor: pointer;
            color: #888;
            transition: color 0.2s;
        }

        .close-modal:hover {
            color: #ef4444;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-secondary {
            background-color: #e2e8f0;
            color: #475569;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-secondary:hover {
            background-color: #cbd5e1;
        }
        
        .btn-primary {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        
        /* Tombol Dashboard */
        .btn-dashboard {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .btn-dashboard:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <!-- Navigasi Atas -->
    <nav class="navbar">
        <a href="#" class="navbar-brand">
            <img src="" alt="Logo Sekolah" style="display: none;">
            <span></span>
        </a>
    </nav>

    <!-- Area Konten -->
    <main class="main-content">
        <div class="dashboard-card">
            <h2>Halaman Arsip Admin</h2>
            <p style="color: #666; margin-top: 10px;">Kelola data arsip sekolah di sini.</p>
        </div>
        
        <!-- Wadah Cari & Tombol -->
        <div class="dashboard-card">
            <div class="table-actions">
                <div class="action-group">
                    <input type="text" id="searchArsip" placeholder="Cari Arsip..." style="padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 250px;">
                </div>
                <div class="action-group">
                    <button id="addArsipBtn" class="btn-action-custom" style="background-color: #4CAF50;"><i class="fas fa-plus"></i> Tambah Arsip</button>
                    <button id="exportPdfBtn" class="btn-action-custom" style="background-color: #008CBA;"><i class="fas fa-file-pdf"></i> Export PDF</button>
                    <a href="dasboradmin.html" class="btn-dashboard"><i class="fas fa-home"></i> Dashboard</a>
                </div>
            </div>

            <div class="table-responsive">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th>Kode Arsip</th>
                            <th>Nama Arsip</th>
                            <th>Tanggal Upload</th>
                            <th>File Arsip</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Wadah Konten -->
        <div class="dashboard-card">
            <p>Konten arsip akan ditampilkan di sini.</p>
        </div>


        <!-- Kaki Halaman -->
        <footer class="main-footer">
            <p>&copy; SIMPPEDIK (Sistem Informasi Manajemen Perkembangan Pembelajaran Peserta Didik).2026</p>
            <p>CopyRight Kenji Studio Developer.</p>
        </footer>
    </main>

    <!-- Modal Tambah Arsip -->
    <div id="arsipModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Tambah Arsip Baru</h3>
                <span class="close-modal">&times;</span>

            </div>
            <form id="arsipForm">
                <div class="form-group">
                    <label for="kodeArsip">Kode Arsip</label>
                    <input type="text" id="kodeArsip" name="kodeArsip" placeholder="Masukkan Kode Arsip" required>
                </div>
                <div class="form-group">
                    <label for="namaArsip">Nama Arsip</label>
                    <input type="text" id="namaArsip" name="namaArsip" placeholder="Masukkan Nama Arsip" required>
                </div>
                <div class="form-group">
                    <label for="tanggalUpload">Tanggal Upload</label>
                    <input type="date" id="tanggalUpload" name="tanggalUpload" required>
                </div>
                <div class="form-group">
                    <label for="fileArsip">Upload File</label>                
                    <input type="file" id="fileArsip" name="fileArsip" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary cancel-btn">Cancel</button>
                    <button type="submit" class="btn-primary" id="simpanArsip">Simpan</button>
                </div>
             </form>
        </div>
    </div>

    <script>
        // --- Koneksi Navbar ---
        const supabaseUrl = 'https://uxgjxtboteoxwwwbutpb.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV4Z2p4dGJvdGVveHd3d2J1dHBiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjE4MDIsImV4cCI6MjA5MTU5NzgwMn0.jO_GLS0DKFE4wwPejh4YVC9ZOO4BENdESH1zoQe1rsc';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        
        if (typeof supabase !== 'undefined') {

            async function loadSchoolIdentity() {
                try {
                    const { data, error } = await supabaseClient
                        .from('identitassekolah')
                        .select('nama_sekolah, logo')
                        .limit(1)
                        .single();
                    
                    if (data) {
                        if (data.nama_sekolah) {
                            document.querySelector('.navbar-brand span').textContent = data.nama_sekolah;
                        }
                        if (data.logo) {
                            const img = document.querySelector('.navbar-brand img');
                            img.src = data.logo;
                            img.style.display = 'block';
                        }
                    }
                } catch (err) {
                    console.error("Error loading school identity:", err);
                }
            }
            document.addEventListener('DOMContentLoaded', loadSchoolIdentity);
        }

        // --- Logika Modal ---
        const modal = document.getElementById('arsipModal');
        const addBtn = document.getElementById('addArsipBtn');
        const closeSpan = document.querySelector('.close-modal');
        const cancelBtn = document.querySelector('.cancel-btn');
        const arsipForm = document.getElementById('arsipForm');

        // Buka Modal
        const kodeArsipInput = document.getElementById('kodeArsip');

        if (addBtn) {
            addBtn.addEventListener('click', () => {
                modal.classList.add('active');
                // Set Tanggal Hari Ini
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('tanggalUpload').value = today;

                // Bikin ID Otomatis
                const randomNum = Math.floor(1000 + Math.random() * 9000);
                const newId = `IDA-${randomNum}`;
                if(kodeArsipInput) kodeArsipInput.value = newId;
            });
        }

        // Tutup Modal
        function closeModal() {
            modal.classList.remove('active');
            arsipForm.reset();
        }

        if (closeSpan) closeSpan.addEventListener('click', closeModal);
        if (cancelBtn) cancelBtn.addEventListener('click', closeModal);

        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        // --- Simpan Data Arsip ---
        arsipForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const kodeArsip = document.getElementById('kodeArsip').value;
            const namaArsip = document.getElementById('namaArsip').value;
            const tanggalUpload = document.getElementById('tanggalUpload').value;
            const fileArsip = document.getElementById('fileArsip').files[0];

            // Cek File
            if (!fileArsip) {
                alert('Harap pilih file arsip untuk diupload.');
                return;
            }

            try {
                // Upload ke Storage
                const timestamp = Date.now();
                const fileExt = fileArsip.name.split('.').pop();
                const fileName = `arsip_${kodeArsip}_${timestamp}.${fileExt}`;
                const { data, error } = await supabaseClient.storage.from('aset').upload(fileName, fileArsip);

                if (error) {
                    throw new Error(`Gagal mengunggah file: ${error.message}`);
                }

                // Ambil Link File
                const fileUrl = `https://mjvobqfcoutazqcovtlp.supabase.co/storage/v1/object/public/aset/${fileName}`;

                // Simpan ke DB
                const { error: dbError } = await supabaseClient
                    .from('arsip')
                    .insert([{ kode_arsip: kodeArsip, nama_arsip: namaArsip, tanggal_upload: tanggalUpload, file: fileUrl }]);

                if (dbError) {
                    throw new Error(`Gagal menyimpan data ke database: ${dbError.message}`);
                }

                alert('Arsip berhasil disimpan!');
                closeModal();
                loadArsipData(); // Refresh Tabel

            } catch (error) {
                console.error('Error:', error);
                alert(error.message);
            }
        });

        // --- Muat Data Arsip ---
        async function loadArsipData() {
            const tableBody = document.querySelector('.custom-table tbody');
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Memuat data...</td></tr>';

            try {
                const { data, error } = await supabaseClient
                    .from('arsip')
                    .select('*')
                    .order('tanggal_upload', { ascending: false });

                if (error) throw error;

                tableBody.innerHTML = '';

                if (!data || data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Belum ada data arsip.</td></tr>';
                    return;
                }

                data.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${item.kode_arsip}</td>
                        <td>${item.nama_arsip}</td>
                        <td>${item.tanggal_upload}</td>
                        <td>
                            <a href="${item.file}" target="_blank" class="btn-download">
                                <i class="fas fa-file-download"></i> Download
                            </a>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading data:', error);
                tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:red;">Gagal memuat data: ${error.message}</td></tr>`;
            }
        }

        // --- Export PDF ---
        document.getElementById('exportPdfBtn').addEventListener('click', () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(18);
            doc.text("Laporan Data Arsip", 14, 22);
            
            const schoolName = document.querySelector('.navbar-brand span').textContent || 'SMK Negeri 1 Muntok';
            doc.setFontSize(12);
            doc.setTextColor(100);
            doc.text(schoolName, 14, 30);

            doc.autoTable({
                head: [['Kode Arsip', 'Nama Arsip', 'Tanggal Upload']],
                body: Array.from(document.querySelectorAll('.custom-table tbody tr')).map(row => {
                    const cells = row.querySelectorAll('td');
                    return [cells[0].innerText, cells[1].innerText, cells[2].innerText];
                }),
                startY: 40,
                theme: 'grid',
                headStyles: { fillColor: [102, 126, 234] }
            });

            doc.save('Data_Arsip.pdf');
        });

        // Muat Data Awal
        document.addEventListener('DOMContentLoaded', loadArsipData);
    </script>
</body>
</html>
